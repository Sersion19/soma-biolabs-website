<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="600" viewBox="0 0 1500 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1A0E"/>
      <stop offset="100%" style="stop-color:#0D200F"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="600" rx="8" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="1496" height="596" rx="7" fill="none" stroke="#1A3A1F" stroke-width="1.5"/>
  
  <!-- Logo icon (centered vertically with text) -->
  <g transform="translate(65, 62) scale(0.35)">
    <rect x="-68" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 -35)"/>
    <rect x="16" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 -35)"/>
    <rect x="-68" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 45)"/>
    <rect x="16" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 45)"/>
  </g>
  
  <!-- SOMA BIOLABS text — aligned to logo height -->
  <text x="110" y="58" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="8" fill="#B8E550">SOMA</text>
  <text x="110" y="82" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="14" letter-spacing="6" fill="#5A7A3A">BIOLABS</text>
  
  <!-- Accent line -->
  <rect x="40" y="110" width="220" height="1" fill="#1A3A1F"/>
  
  <!-- Product Name -->
  <text x="40" y="200" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="72" letter-spacing="2" fill="#F2F0EA">BPC-157</text>
  
  <!-- Dosage -->
  <text x="40" y="260" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="36" fill="#B8E550">10mg</text>
  <text x="145" y="260" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="24" fill="#5A7A3A">· Lyophilized</text>
  
  <!-- Divider -->
  <rect x="40" y="295" width="200" height="1" fill="#1A3A1F"/>
  
  <!-- Batch info -->
  <text x="40" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">Batch</text>
  <text x="40" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="2" fill="#7A9A60">SBL-260301</text>
  
  <!-- Storage -->
  <text x="250" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">Storage</text>
  <text x="250" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" fill="#7A9A60">2-8°C</text>
  
  <!-- CAS -->
  <text x="450" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">CAS</text>
  <text x="450" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="1" fill="#7A9A60">137525-51-0</text>
  
  <!-- Research disclaimer — bigger -->
  <rect x="40" y="410" width="560" height="65" rx="6" fill="rgba(184,229,80,0.08)"/>
  <rect x="40" y="410" width="560" height="65" rx="6" fill="none" stroke="#1A3A1F" stroke-width="0.5"/>
  <text x="55" y="438" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="2" fill="#B8E550">FOR RESEARCH USE ONLY</text>
  <text x="55" y="462" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="13" fill="#5A7A3A">Not intended for human or veterinary use</text>
  
  <!-- Website -->
  <text x="40" y="545" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="16" letter-spacing="2" fill="#3A5A20">somabiolabs.com</text>
  
  <!-- Right side — trust badges list -->
  <text x="1050" y="52" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="11" letter-spacing="3" fill="#5A7A3A" text-transform="uppercase">SOMA BIOLABS</text>
  <rect x="1050" y="62" width="120" height="1" fill="#1A3A1F"/>
  
  <circle cx="1060" cy="90" r="3" fill="#B8E550"/>
  <text x="1075" y="95" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="14" fill="#7A9A60">Janoshik Tested</text>
  
  <circle cx="1060" cy="120" r="3" fill="#B8E550"/>
  <text x="1075" y="125" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="14" fill="#7A9A60">EU Quality Standards</text>
  
  <circle cx="1060" cy="150" r="3" fill="#B8E550"/>
  <text x="1075" y="155" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="14" fill="#7A9A60">Double Verified</text>
  
  <circle cx="1060" cy="180" r="3" fill="#B8E550"/>
  <text x="1075" y="185" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="14" fill="#7A9A60">≥99% HPLC Purity</text>
  
  <circle cx="1060" cy="210" r="3" fill="#B8E550"/>
  <text x="1075" y="215" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="14" fill="#7A9A60">COA Available</text>
  
  <!-- Orbit element (below trust list) -->
  <circle cx="1200" cy="380" r="100" fill="none" stroke="#1A3A1F" stroke-width="1"/>
  <circle cx="1200" cy="380" r="60" fill="none" stroke="#1A3A1F" stroke-width="0.5"/>
  <circle cx="1200" cy="380" r="3" fill="#B8E550" opacity="0.4"/>
  <circle cx="1270" cy="360" r="2.5" fill="#B8E550" opacity="0.3"/>
  <circle cx="1155" cy="325" r="2.5" fill="#B8E550" opacity="0.3"/>
  <circle cx="1240" cy="430" r="2" fill="#B8E550" opacity="0.2"/>
  <circle cx="1140" cy="410" r="2" fill="#B8E550" opacity="0.2"/>
  
  <!-- EU flag -->
  <text x="1380" y="545" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="16" fill="#3A5A20" text-anchor="end">🇪🇺</text>
</svg>