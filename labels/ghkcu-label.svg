<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="600" viewBox="0 0 1500 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1A0E"/>
      <stop offset="100%" style="stop-color:#0D200F"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="600" rx="8" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="1496" height="596" rx="7" fill="none" stroke="#1A3A1F" stroke-width="1.5"/>
  
  <!-- Logo icon -->
  <g transform="translate(65, 65) scale(0.32)">
    <rect x="-68" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 -35)"/>
    <rect x="16" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 -35)"/>
    <rect x="-68" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 45)"/>
    <rect x="16" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 45)"/>
  </g>
  
  <!-- SOMA BIOLABS text next to icon -->
  <text x="105" y="55" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="28" letter-spacing="8" fill="#B8E550">SOMA</text>
  <text x="105" y="80" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="12" letter-spacing="6" fill="#5A7A3A">BIOLABS</text>
  
  <!-- Accent line -->
  <rect x="40" y="110" width="220" height="1" fill="#1A3A1F"/>
  
  <!-- Product Name -->
  <text x="40" y="200" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="72" letter-spacing="2" fill="#F2F0EA">GHK-Cu</text>
  
  <!-- Dosage -->
  <text x="40" y="260" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="36" fill="#B8E550">100mg</text>
  <text x="185" y="260" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="24" fill="#5A7A3A">· Lyophilized</text>
  
  <!-- Divider -->
  <rect x="40" y="295" width="200" height="1" fill="#1A3A1F"/>
  
  <!-- Batch info -->
  <text x="40" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">Batch</text>
  <text x="40" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="2" fill="#7A9A60">SBL-260302</text>
  
  <!-- Storage -->
  <text x="250" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">Storage</text>
  <text x="250" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" fill="#7A9A60">2-8°C</text>
  
  <!-- CAS -->
  <text x="450" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">CAS</text>
  <text x="450" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="1" fill="#7A9A60">49557-75-7</text>
  
  <!-- Sequence -->
  <text x="700" y="340" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#5A7A3A">Sequence</text>
  <text x="700" y="365" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="1" fill="#7A9A60">Gly-His-Lys·Cu²⁺</text>
  
  <!-- Research disclaimer -->
  <rect x="40" y="420" width="520" height="50" rx="4" fill="rgba(184,229,80,0.08)"/>
  <text x="55" y="442" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="13" letter-spacing="1.5" fill="#B8E550">FOR RESEARCH USE ONLY</text>
  <text x="55" y="460" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="11" fill="#5A7A3A">Not intended for human or veterinary use</text>
  
  <!-- Website -->
  <text x="40" y="540" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="16" letter-spacing="2" fill="#3A5A20">somabiolabs.com</text>
  
  <!-- Right side — molecular/science element -->
  <circle cx="1200" cy="200" r="120" fill="none" stroke="#1A3A1F" stroke-width="1"/>
  <circle cx="1200" cy="200" r="80" fill="none" stroke="#1A3A1F" stroke-width="0.5"/>
  <circle cx="1200" cy="200" r="4" fill="#B8E550" opacity="0.4"/>
  <circle cx="1280" cy="180" r="3" fill="#B8E550" opacity="0.3"/>
  <circle cx="1150" cy="140" r="3" fill="#B8E550" opacity="0.3"/>
  <circle cx="1250" cy="260" r="2.5" fill="#B8E550" opacity="0.2"/>
  <circle cx="1130" cy="230" r="2.5" fill="#B8E550" opacity="0.2"/>
  
  <!-- EU flag -->
  <text x="1350" y="540" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="14" fill="#3A5A20" text-anchor="end">🇪🇺</text>
</svg>