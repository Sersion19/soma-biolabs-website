<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2600" viewBox="0 0 2400 2600">
  
  <!-- BAND 1: Top accent strip -->
  <rect x="0" y="0" width="2400" height="8" fill="#B8E550"/>
  
  <!-- BAND 2: Logo bar — slightly lighter bg -->
  <rect x="0" y="8" width="2400" height="280" fill="#0D200F"/>
  
  <!-- Logo icon centered -->
  <g transform="translate(1120, 130) scale(0.85)">
    <rect x="-68" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 -35)"/>
    <rect x="16" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 -35)"/>
    <rect x="-68" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 45)"/>
    <rect x="16" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 45)"/>
  </g>
  
  <text x="1200" y="235" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="80" letter-spacing="18" fill="#B8E550" text-anchor="middle">SOMA</text>
  <text x="1200" y="278" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="36" letter-spacing="16" fill="#5A7A3A" text-anchor="middle">BIOLABS</text>
  
  <!-- BAND 3: Main product area — darkest -->
  <rect x="0" y="288" width="2400" height="1050" fill="#0B1A0E"/>
  
  <!-- Product Name -->
  <text x="1200" y="680" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="300" letter-spacing="8" fill="#F2F0EA" text-anchor="middle">BPC-157</text>
  
  <!-- Dosage -->
  <text x="1200" y="940" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="180" fill="#B8E550" text-anchor="middle">10mg</text>
  
  <!-- Lyophilized -->
  <text x="1200" y="1080" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="80" fill="#5A7A3A" text-anchor="middle">Lyophilized Powder</text>
  
  <!-- BAND 4: Data bar — charcoal bg -->
  <rect x="0" y="1338" width="2400" height="260" fill="#1A2A1C"/>
  <rect x="0" y="1338" width="2400" height="1" fill="#1A3A1F"/>
  <rect x="0" y="1598" width="2400" height="1" fill="#1A3A1F"/>
  
  <text x="350" y="1440" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" fill="#5A7A3A" text-anchor="middle">Batch</text>
  <text x="350" y="1510" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="48" letter-spacing="3" fill="#7A9A60" text-anchor="middle">SBL-260301</text>
  
  <text x="900" y="1440" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" fill="#5A7A3A" text-anchor="middle">Storage</text>
  <text x="900" y="1510" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="48" fill="#7A9A60" text-anchor="middle">2-8°C</text>
  
  <text x="1450" y="1440" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" fill="#5A7A3A" text-anchor="middle">CAS</text>
  <text x="1450" y="1510" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="48" letter-spacing="2" fill="#7A9A60" text-anchor="middle">137525-51-0</text>
  
  <text x="2000" y="1440" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" fill="#5A7A3A" text-anchor="middle">Purity</text>
  <text x="2000" y="1510" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="48" fill="#B8E550" text-anchor="middle">≥99%</text>
  
  <!-- Vertical dividers in data bar -->
  <rect x="625" y="1388" width="1" height="160" fill="#1A3A1F"/>
  <rect x="1175" y="1388" width="1" height="160" fill="#1A3A1F"/>
  <rect x="1725" y="1388" width="1" height="160" fill="#1A3A1F"/>
  
  <!-- BAND 5: Orbit / spacer area -->
  <rect x="0" y="1599" width="2400" height="440" fill="#0B1A0E"/>
  
  <circle cx="1200" cy="1820" r="170" fill="none" stroke="#1A3A1F" stroke-width="1.5"/>
  <circle cx="1200" cy="1820" r="100" fill="none" stroke="#1A3A1F" stroke-width="0.8"/>
  <circle cx="1200" cy="1820" r="35" fill="none" stroke="#1A3A1F" stroke-width="0.5"/>
  <circle cx="1200" cy="1820" r="5" fill="#B8E550" opacity="0.5"/>
  <circle cx="1320" cy="1780" r="4" fill="#B8E550" opacity="0.3"/>
  <circle cx="1090" cy="1720" r="4" fill="#B8E550" opacity="0.3"/>
  <circle cx="1280" cy="1910" r="3" fill="#B8E550" opacity="0.25"/>
  <circle cx="1090" cy="1890" r="3" fill="#B8E550" opacity="0.2"/>
  
  <!-- BAND 6: Disclaimer bar — accent tinted -->
  <rect x="0" y="2039" width="2400" height="200" fill="#111F14"/>
  <rect x="0" y="2039" width="2400" height="1" fill="#1A3A1F"/>
  <rect x="0" y="2239" width="2400" height="1" fill="#1A3A1F"/>
  
  <text x="1200" y="2130" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="56" letter-spacing="5" fill="#B8E550" text-anchor="middle">FOR RESEARCH USE ONLY</text>
  <text x="1200" y="2195" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" fill="#5A7A3A" text-anchor="middle">Not intended for human or veterinary use</text>
  
  <!-- BAND 7: Footer — website + socials -->
  <rect x="0" y="2240" width="2400" height="360" fill="#0B1A0E"/>
  
  <text x="1200" y="2380" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="42" letter-spacing="4" fill="#3A5A20" text-anchor="middle">somabiolabs.com</text>
  <text x="1200" y="2440" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="30" letter-spacing="3" fill="#1A3A1F" text-anchor="middle">IG · X · TikTok  @somabiolabs</text>
  
  <!-- EU flag -->
  <text x="1200" y="2540" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="40" fill="#3A5A20" text-anchor="middle">🇪🇺</text>
</svg>