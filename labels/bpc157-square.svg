<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2600" viewBox="0 0 2400 2600">
  
  <!-- BAND 1: Top accent strip -->
  <rect x="0" y="0" width="2400" height="8" fill="#B8E550"/>
  
  <!-- BAND 2: Logo bar -->
  <rect x="0" y="8" width="2400" height="320" fill="#0D200F"/>
  
  <!-- Logo icon — left of text, group centered -->
  <g transform="translate(830, 175) scale(1.0)">
    <rect x="-68" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 -35)"/>
    <rect x="16" y="-80" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 -35)"/>
    <rect x="-68" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(-15 -42 45)"/>
    <rect x="16" y="0" width="52" height="90" rx="26" fill="#B8E550" transform="rotate(15 42 45)"/>
  </g>
  
  <text x="960" y="175" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="100" letter-spacing="20" fill="#B8E550">SOMA</text>
  <text x="960" y="240" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="44" letter-spacing="18" fill="#5A7A3A">BIOLABS</text>
  
  <!-- BAND 3: Main product area -->
  <rect x="0" y="328" width="2400" height="1000" fill="#0B1A0E"/>
  
  <!-- Product Name -->
  <text x="1200" y="720" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="340" letter-spacing="8" fill="#F2F0EA" text-anchor="middle">BPC-157</text>
  
  <!-- Dosage -->
  <text x="1200" y="980" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="220" fill="#B8E550" text-anchor="middle">10mg</text>
  
  <!-- Lyophilized -->
  <text x="1200" y="1120" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="90" fill="#5A7A3A" text-anchor="middle">Lyophilized Powder</text>
  
  <!-- BAND 4: Data bar — 3 columns now (no CAS) -->
  <rect x="0" y="1328" width="2400" height="300" fill="#1A2A1C"/>
  <rect x="0" y="1328" width="2400" height="1" fill="#1A3A1F"/>
  <rect x="0" y="1628" width="2400" height="1" fill="#1A3A1F"/>
  
  <text x="500" y="1430" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="42" fill="#5A7A3A" text-anchor="middle">Batch</text>
  <text x="500" y="1520" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="56" letter-spacing="3" fill="#7A9A60" text-anchor="middle">SBL-260301</text>
  
  <text x="1200" y="1420" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="48" fill="#5A7A3A" text-anchor="middle">Storage</text>
  <text x="1200" y="1530" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="80" fill="#B8E550" text-anchor="middle">2-8°C</text>
  
  <text x="1900" y="1420" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="48" fill="#5A7A3A" text-anchor="middle">Purity</text>
  <text x="1900" y="1530" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="80" fill="#B8E550" text-anchor="middle">≥99%</text>
  
  <!-- Vertical dividers -->
  <rect x="800" y="1388" width="1" height="180" fill="#1A3A1F"/>
  <rect x="1600" y="1388" width="1" height="180" fill="#1A3A1F"/>
  
  <!-- BAND 5: Orbit -->
  <rect x="0" y="1629" width="2400" height="380" fill="#0B1A0E"/>
  
  <circle cx="1200" cy="1820" r="150" fill="none" stroke="#1A3A1F" stroke-width="1.5"/>
  <circle cx="1200" cy="1820" r="90" fill="none" stroke="#1A3A1F" stroke-width="0.8"/>
  <circle cx="1200" cy="1820" r="30" fill="none" stroke="#1A3A1F" stroke-width="0.5"/>
  <circle cx="1200" cy="1820" r="5" fill="#B8E550" opacity="0.5"/>
  <circle cx="1310" cy="1785" r="4" fill="#B8E550" opacity="0.3"/>
  <circle cx="1100" cy="1730" r="4" fill="#B8E550" opacity="0.3"/>
  <circle cx="1280" cy="1900" r="3" fill="#B8E550" opacity="0.25"/>
  <circle cx="1100" cy="1880" r="3" fill="#B8E550" opacity="0.2"/>
  
  <!-- BAND 6: Disclaimer — INVERTED: lime bg, dark text -->
  <rect x="0" y="2009" width="2400" height="240" fill="#B8E550"/>
  
  <text x="1200" y="2120" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="68" letter-spacing="6" fill="#0B1A0E" text-anchor="middle">FOR RESEARCH USE ONLY</text>
  <text x="1200" y="2200" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="42" fill="#3A5A20" text-anchor="middle">Not intended for human or veterinary use</text>
  
  <!-- BAND 7: Footer -->
  <rect x="0" y="2249" width="2400" height="351" fill="#0B1A0E"/>
  
  <text x="1200" y="2400" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="52" letter-spacing="5" fill="#3A5A20" text-anchor="middle">somabiolabs.com</text>
  <text x="1200" y="2470" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="36" letter-spacing="3" fill="#1A3A1F" text-anchor="middle">IG · X · TikTok  @somabiolabs</text>
  
  <text x="1200" y="2560" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="44" fill="#3A5A20" text-anchor="middle">🇪🇺</text>
